<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="CodeCure — Smart Medical Inventory Management System Login"/>
<title>CodeCure — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg-body: #0F172A;
    --bg-card: #1E293B;
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --accent-primary: #D97706;
    --accent-secondary: #0D9488;
    --border-color: rgba(255, 255, 255, 0.05);
    --shadow-style: 0 10px 30px rgba(0, 0, 0, 0.4);
    --sidebar-bg: #1E293B;
  }
  [data-theme="white-gold"] {
    --bg-body: #F8FAFC;
    --bg-card: #FFFFFF;
    --text-primary: #1E293B;
    --text-secondary: #64748B;
    --accent-primary: #B45309;
    --accent-secondary: #0D9488;
    --border-color: #E2E8F0;
    --shadow-style: 0 10px 25px rgba(0, 0, 0, 0.05);
    --sidebar-bg: #F4F7FB;
  }
  [data-theme="white-black"] {
    --bg-body: #FFFFFF;
    --bg-card: #FFFFFF;
    --text-primary: #000000;
    --text-secondary: #333333;
    --accent-primary: #000000;
    --accent-secondary: #000000;
    --border-color: #000000;
    --shadow-style: none;
    --sidebar-bg: #FFFFFF;
  }
  [data-theme="white-orange"] {
    --bg-body: #FFFFFF;
    --bg-card: #FFFFFF;
    --text-primary: #1E293B;
    --text-secondary: #64748B;
    --accent-primary: #EA580C;
    --accent-secondary: #0D9488;
    --border-color: #E2E8F0;
    --shadow-style: 0 10px 25px rgba(0, 0, 0, 0.05);
    --sidebar-bg: #F4F7FB;
  }
  [data-theme="white-black-gold"] {
    --bg-body: #FFFFFF;
    --bg-card: #FFFFFF;
    --text-primary: #1E293B;
    --text-secondary: #475569;
    --accent-primary: #EAB308;
    --accent-secondary: #000000;
    --border-color: #000000;
    --shadow-style: 0 10px 25px rgba(0, 0, 0, 0.05);
    --sidebar-bg: #FFFFFF;
  }

  body {
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: flex-end; /* Card on the right */
    /* Left side background with Mesh Gradient and Dot Pattern */
    background: 
      radial-gradient(circle at 25% 35%, color-mix(in srgb, var(--accent-primary) 8%, transparent), transparent 50%),
      radial-gradient(circle at 10% 75%, color-mix(in srgb, var(--accent-secondary) 12%, transparent), transparent 60%),
      url('data:image/svg+xml;utf8,<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1.5" fill="rgba(128,128,128,0.15)"/></svg>'),
      var(--bg-body);
    position: relative;
    overflow: hidden;
  }

  /* Right Side White Panel */
  body::after {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 50vw;
    height: 100vh;
    background: var(--bg-card);
    z-index: 0;
  }

  /* Left Side Content Construction using empty divs */
  .orb1 {
    position: absolute;
    top: calc(50vh - 140px); left: 60px;
    width: 44px; height: 44px;
    border: 2px solid #FFFFFF;
    border-radius: 6px;
    z-index: 5;
  }
  .orb1::before {
    content: ""; position: absolute;
    top: 20px; left: 12px; right: 12px; height: 2px;
    background: #FFFFFF;
  }
  .orb1::after {
    content: ""; position: absolute;
    left: 20px; top: 12px; bottom: 12px; width: 2px;
    background: #FFFFFF;
  }

  .orb2 {
    position: absolute;
    top: calc(50vh - 60px); left: 60px;
    color: var(--text-primary);
    font-size: 3.5rem;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1px;
    z-index: 5;
  }
  .orb2::before { content: "CodeCure"; white-space: pre-wrap; }

  .orb3 {
    position: absolute;
    top: calc(50vh + 20px); left: 60px;
    color: var(--accent-secondary);
    font-size: 1.05rem;
    line-height: 1.6;
    max-width: 400px;
    z-index: 5;
  }
  .orb3::before { content: "Smart Medical Inventory Portal. Secure access for authorized personnel only."; }

  .geo-triangle {
    position: absolute;
    bottom: 60px; left: 60px;
    width: calc(50vw - 120px);
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 24px;
    color: var(--text-primary);
    z-index: 5;
  }
  .geo-triangle::before {
    content: "System Status: Optimal";
    display: block;
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 8px;
    padding-left: 32px;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>') no-repeat left center;
    background-size: 22px;
  }
  .geo-triangle::after {
    content: "All core systems operational. Last maintenance check completed 0400 hours.";
    display: block;
    font-size: 0.95rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .geo-square, .geo-circle, .particles, .status-bar, .theme-switcher { display: none; }

  /* ═══ LOGIN CARD (Right Panel) ═══ */
  .card {
    position: relative;
    z-index: 10;
    width: 50vw;
    height: 100vh;
    background: transparent;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 12%;
  }

  .logo-wrap { text-align: left; margin-bottom: 40px; }
  .logo-icon { display: none; }
  
  .logo-title {
    font-size: 0; color: transparent; margin-bottom: 12px;
  }
  .logo-title::before {
    content: "Sign In";
    font-size: 2.2rem;
    color: var(--text-primary);
    font-weight: 600;
    display: block;
  }
  .logo-sub {
    font-size: 0; color: transparent; text-transform: none; letter-spacing: normal;
  }
  .logo-sub::before {
    content: "Enter your credentials to access the secure clinical network.";
    font-size: 1rem;
    color: var(--text-secondary);
    display: block;
    font-weight: 400;
  }

  /* ═══ ROLE TABS ═══ */
  .role-tabs {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    position: relative;
    padding-top: 30px;
  }
  .role-tabs::before {
    content: "SELECT ROLE";
    position: absolute;
    top: 0; left: 0;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    font-weight: 600;
  }
  
  .role-tab {
    flex: 1;
    aspect-ratio: 1;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .role-tab:hover, .role-tab.active {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
  }
  
  .role-tab .tab-icon {
    font-size: 0;
    width: 24px; height: 24px;
    margin-bottom: 8px;
    background-color: currentColor;
    display: block;
  }
  #role-doctor .tab-icon {
    mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>') no-repeat center;
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>') no-repeat center;
  }
  #role-admin .tab-icon {
    mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><circle cx="12" cy="11" r="3"/></svg>') no-repeat center;
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><circle cx="12" cy="11" r="3"/></svg>') no-repeat center;
  }
  #role-pharmacist .tab-icon {
    mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><rect x="7" y="7" width="10" height="14" rx="2"/><path d="M10 3h4v4h-4z"/><path d="M12 11v4"/><path d="M10 13h4"/></svg>') no-repeat center;
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><rect x="7" y="7" width="10" height="14" rx="2"/><path d="M10 3h4v4h-4z"/><path d="M12 11v4"/><path d="M10 13h4"/></svg>') no-repeat center;
  }
  #role-cashier .tab-icon {
    mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/></svg>') no-repeat center;
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/></svg>') no-repeat center;
  }
  .role-tab .tab-label { position: relative; z-index: 1; }

  /* ═══ FORM ELEMENTS ═══ */
  .form-label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }
  
  .form-label[for="password"] {
    display: flex;
    justify-content: space-between;
  }
  .form-label[for="password"]::after {
    content: "Forgot password?";
    color: var(--accent-secondary);
    text-transform: none;
    letter-spacing: normal;
    font-weight: 500;
    cursor: pointer;
  }

  .input-wrap { position: relative; margin-bottom: 24px; }
  .input-wrap input {
    width: 100%;
    padding: 14px 16px 14px 44px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.2s;
  }
  .input-wrap input::placeholder { color: var(--text-secondary); }
  .input-wrap input:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.1);
  }

  .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
  }
  .input-wrap input:focus ~ .input-icon { color: var(--accent-primary); }
  .input-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px;
  }
  .toggle-pw:hover { color: var(--accent-primary); }
  .toggle-pw svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .hint, .error-box { display: none; } /* Hide hint for clean UI */

  .btn-login {
    width: 100%; padding: 14px;
    background: var(--accent-primary);
    border: none; border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-login:hover { opacity: 0.9; }
  .btn-login .btn-text { font-size: 0; color: transparent; }
  .btn-login .btn-text::before {
    content: "➔  Sign In";
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: #FFFFFF;
    display: inline-block;
  }

  /* ═══ FOOTER ═══ */
  .footer {
    text-align: center; margin-top: 40px;
    font-size: 0; color: transparent;
  }
  .footer::before {
    content: "Authorized Use Only. Activities may be monitored.\A © 2024 CodeCure. All rights reserved.";
    font-size: 0.75rem;
    color: #94A3B8;
    white-space: pre-wrap;
    line-height: 1.6;
    display: block;
  }
  .footer a, .footer .divider { display: none; }

  @media (max-width: 768px) {
    body { flex-direction: column; background: var(--bg-body); }
    body::after { display: none; }
    .card { width: 100vw; padding: 40px 20px; }
    .orb1, .orb2, .orb3, .geo-triangle { display: none; } /* Hide left panel on mobile */
  }
</style>
</head>
<body>

<!-- Background elements -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="geo-shape geo-triangle"></div>
<div class="geo-shape geo-square"></div>
<div class="geo-shape geo-circle"></div>
<div class="particles" id="particles"></div>

<!-- Theme Switcher -->
<div class="theme-switcher" id="theme-switcher">
  <span class="theme-label">Theme</span>
  <div class="theme-dot active" data-t="teal" onclick="setTheme('teal')">
    <span class="tip">Teal Surge</span>
  </div>
  <div class="theme-dot" data-t="violet" onclick="setTheme('violet')">
    <span class="tip">Violet Nebula</span>
  </div>
  <div class="theme-dot" data-t="sunset" onclick="setTheme('sunset')">
    <span class="tip">Sunset Blaze</span>
  </div>
  <div class="theme-dot" data-t="ocean" onclick="setTheme('ocean')">
    <span class="tip">Ocean Depths</span>
  </div>
  <div class="theme-dot" data-t="rose" onclick="setTheme('rose')">
    <span class="tip">Rose Gold</span>
  </div>
  <div class="theme-dot" data-t="emerald" onclick="setTheme('emerald')">
    <span class="tip">Emerald Forest</span>
  </div>
</div>

<!-- Login Card -->
<div class="card" id="login-card">
  <div class="logo-wrap">
    <div class="logo-icon">🏥</div>
    <div class="logo-title">Code<span>Cure</span></div>
    <div class="logo-sub">Smart Medical Inventory</div>
  </div>

  <!-- Role quick-fill tabs -->
  <div class="role-tabs">
    <button class="role-tab active" id="role-admin" onclick="setRole('admin','1234',this)">
      <span class="tab-icon">👨‍💼</span><span class="tab-label">Admin</span>
    </button>
    <button class="role-tab" id="role-pharmacist" onclick="setRole('pharmacist','1234',this)">
      <span class="tab-icon">💊</span><span class="tab-label">Pharmacist</span>
    </button>
    <button class="role-tab" id="role-cashier" onclick="setRole('cashier','1234',this)">
      <span class="tab-icon">🛒</span><span class="tab-label">Cashier</span>
    </button>
    <button class="role-tab" id="role-doctor" onclick="setRole('doctor','1234',this)">
      <span class="tab-icon">🩺</span><span class="tab-label">Doctor</span>
    </button>
  </div>

  <form method="POST" action="/" id="login-form">
    {% if error %}
    <div class="error-box">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <label class="form-label" for="username">Username</label>
    <div class="input-wrap">
      <input id="username" name="username" type="text" placeholder="Enter your username" required autocomplete="username"/>
      <div class="input-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>

    <label class="form-label" for="password">Password</label>
    <div class="input-wrap">
      <input id="password" name="password" type="password" placeholder="Enter your password" required autocomplete="current-password"/>
      <div class="input-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <button type="button" class="toggle-pw" id="toggle-pw" onclick="togglePassword()">
        <svg id="eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="eye-closed" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>

    <div class="hint">
      <span class="hint-icon">💡</span>
      <span>Demo password: <b>1234</b> for all roles</span>
    </div>

    <button class="btn-login" type="submit" id="btn-login">
      <span class="btn-text">🔐 Sign In to CodeCure</span>
    </button>
  </form>

  <div class="footer">
    🏥 CodeCure <span class="divider"></span> Medical Store Unit<br/>
    <a href="#">© 2025 CodeCure Team</a>
  </div>
</div>

<!-- Status indicator -->
<div class="status-bar">
  <div class="status-dot"></div>
  <span>System Online — Secure Connection</span>
</div>

<script>
// ── THEME MANAGEMENT ─────────────────────────────────────────────────
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('codecure-theme', theme);

  // Update active dot
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.t === theme);
  });
}

// Restore saved theme
(function() {
  const saved = localStorage.getItem('codecure-theme');
  if (saved) setTheme(saved);
})();

// ── ROLE TABBING ─────────────────────────────────────────────────────
function setRole(user, pass, el) {
  document.getElementById('username').value = user;
  document.getElementById('password').value = pass;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  // Subtle focus animation
  document.getElementById('username').focus();
  setTimeout(() => document.getElementById('password').focus(), 150);
  setTimeout(() => document.getElementById('username').blur(), 300);
  setTimeout(() => document.getElementById('password').blur(), 300);
}

// ── PASSWORD TOGGLE ──────────────────────────────────────────────────
function togglePassword() {
  const pw = document.getElementById('password');
  const open = document.getElementById('eye-open');
  const closed = document.getElementById('eye-closed');

  if (pw.type === 'password') {
    pw.type = 'text';
    open.style.display = 'none';
    closed.style.display = 'block';
  } else {
    pw.type = 'password';
    open.style.display = 'block';
    closed.style.display = 'none';
  }
}

// ── FLOATING PARTICLES ───────────────────────────────────────────────
(function createParticles() {
  const container = document.getElementById('particles');
  const count = 30;
  for (let i = 0; i < count; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.width = (Math.random() * 3 + 1) + 'px';
    particle.style.height = particle.style.width;
    particle.style.animationDuration = (Math.random() * 12 + 8) + 's';
    particle.style.animationDelay = (Math.random() * 10) + 's';
    particle.style.opacity = Math.random() * 0.5 + 0.2;
    container.appendChild(particle);
  }
})();

// ── FORM SUBMIT (SEAMLESS FLY-THROUGH) ───────────────────────────────
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const form = this;
  const btn = document.getElementById('btn-login');
  btn.querySelector('.btn-text').textContent = '⏳ Authenticating…';
  btn.style.opacity = '.8';
  btn.style.pointerEvents = 'none';
  
  // Trigger fly-through animation
  document.body.classList.add('page-exit');
  
  // Submit the form just as the animation completes covering the screen
  setTimeout(() => {
    form.submit();
  }, 450);
});

// ── 3D MAGNETIC HOVER ────────────────────────────────────────────────
const loginCard = document.getElementById('login-card');
loginCard.addEventListener('mousemove', e => {
  const rect = loginCard.getBoundingClientRect();
  const x = e.clientX - rect.left; 
  const y = e.clientY - rect.top;  
  const centerX = rect.width / 2;
  const centerY = rect.height / 2;
  
  const rotateX = ((centerY - y) / centerY) * 4; 
  const rotateY = ((x - centerX) / centerX) * 4;
  
  loginCard.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
  loginCard.style.transition = 'transform 0.1s cubic-bezier(0.16, 1, 0.3, 1)';
  loginCard.style.boxShadow = `${-rotateY * 3}px ${rotateX * 3 + 20}px 50px rgba(0,0,0,0.5)`;
});
loginCard.addEventListener('mouseleave', () => {
  loginCard.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
  loginCard.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
  loginCard.style.boxShadow = '';
});

// ── KEYBOARD SHORTCUT: Enter on role tab ─────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement.classList.contains('role-tab')) {
    document.activeElement.click();
    e.preventDefault();
  }
  // 1-4 quick role select
  if (e.altKey && ['1','2','3','4'].includes(e.key)) {
    e.preventDefault();
    const tabs = ['role-admin','role-pharmacist','role-cashier','role-doctor'];
    document.getElementById(tabs[parseInt(e.key)-1]).click();
  }
});
</script>
</body>
